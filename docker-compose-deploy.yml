# Docker Compose for Superset Deployment
# This file is used by Azure DevOps pipeline for production deployments

x-superset-volumes:
  &superset-volumes
  - superset_home:/app/superset_home

services:
  redis:
    image: redis:7
    container_name: superset_cache
    restart: unless-stopped
    networks:
      - superset-network
    volumes:
      - redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    image: postgres:17.4
    container_name: superset_db
    shm_size: 1g
    user: postgres
    restart: unless-stopped
    networks:
      - superset-network
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-superset}
      POSTGRES_USER: ${POSTGRES_USER:-superset}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-superset}
    command: >
      postgres
      -c wal_level=logical
      -c max_wal_senders=10
      -c max_replication_slots=5
      -c hot_standby=on
      -c hot_standby_feedback=on
    volumes:
      - db_home:/var/lib/postgresql/data
      - ./docker/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-superset} --dbname=${POSTGRES_DB:-superset}"]
      interval: 10s
      timeout: 5s
      retries: 5

  superset:
    image: ${SUPERSET_IMAGE:-intellisuite.azurecr.io/superset:latest}
    container_name: superset_app
    command: ["/app/docker/docker-bootstrap.sh", "app-gunicorn"]
    user: "root"
    restart: unless-stopped
    networks:
      - superset-network
    ports:
      - "${SUPERSET_PORT:-8088}:8088"
    environment:
      - SUPERSET_SECRET_KEY=${SUPERSET_SECRET_KEY}
      - DATABASE_DIALECT=${DATABASE_DIALECT:-postgresql}
      - DATABASE_HOST=${DATABASE_HOST:-db}
      - DATABASE_PORT=${DATABASE_PORT:-5432}
      - DATABASE_DB=${DATABASE_DB:-superset}
      - DATABASE_USER=${DATABASE_USER:-superset}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:-superset}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
    depends_on:
      superset-init:
        condition: service_completed_successfully
    volumes: *superset-volumes

  superset-init:
    image: ${SUPERSET_IMAGE:-intellisuite.azurecr.io/superset:latest}
    container_name: superset_init
    command: ["/app/docker/docker-init.sh"]
    user: "root"
    networks:
      - superset-network
    environment:
      - SUPERSET_SECRET_KEY=${SUPERSET_SECRET_KEY}
      - DATABASE_DIALECT=${DATABASE_DIALECT:-postgresql}
      - DATABASE_HOST=${DATABASE_HOST:-db}
      - DATABASE_PORT=${DATABASE_PORT:-5432}
      - DATABASE_DB=${DATABASE_DB:-superset}
      - DATABASE_USER=${DATABASE_USER:-superset}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:-superset}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes: *superset-volumes
    healthcheck:
      disable: true
      
networks:
  superset-network:
    name: ${DOCKER_NETWORK:-superset-network}
    external: false

volumes:
  superset_home:
    external: false
  db_home:
    external: false
  redis:
    external: false

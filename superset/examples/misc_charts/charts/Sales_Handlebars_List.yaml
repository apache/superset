certification_details: null
certified_by: null
dataset_uuid: e8623bb9-5e00-f531-506a-19607f5f8005
description: Sales per product line rendered through a Handlebars template.
params:
  groupby:
  - product_line
  handlebarsTemplate: |-
    <ul>
      {{#each data}}
      <li><strong>{{product_line}}</strong>: {{formatNumber [SUM(sales)]}}</li>
      {{/each}}
    </ul>
  metrics:
  - aggregate: SUM
    column:
      column_name: sales
    expressionType: SIMPLE
    label: SUM(sales)
    optionName: metric_sales_hbs
  query_mode: aggregate
  row_limit: 100
  time_range: No filter
  viz_type: handlebars
query_context: null
slice_name: Sales Handlebars List

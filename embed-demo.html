<!DOCTYPE html>
<html>
<head>
  <title>Superset Embedded Chart Demo</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px;
      background: #f5f5f5;
    }
    h1 { color: #333; }
    .input-section {
      background: white;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }
    input[type="text"] {
      width: 100%;
      padding: 10px;
      font-family: monospace;
      font-size: 13px;
      border: 1px solid #ddd;
      border-radius: 4px;
      box-sizing: border-box;
      margin-bottom: 12px;
    }
    button {
      background: #20a7c9;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 10px;
    }
    button:hover {
      background: #1a8fa8;
    }
    .chart-container {
      background: white;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      min-height: 450px;
    }
    label {
      font-weight: 600;
      display: block;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <h1>Superset Embedded Chart Demo</h1>

  <div class="input-section">
    <label for="iframe-url-input">iframe_url (from get_embeddable_chart response):</label>
    <input type="text" id="iframe-url-input" placeholder="http://localhost:8088/embedded/chart/?permalink_key=..." />

    <label for="guest-token-input">guest_token (from get_embeddable_chart response):</label>
    <input type="text" id="guest-token-input" placeholder="eyJ..." />

    <button onclick="embedChart()">Embed Chart</button>
  </div>

  <div class="chart-container" id="chart-container">
    <p style="color: #999; text-align: center; margin-top: 200px;">Chart will appear here</p>
  </div>

  <script>
    function embedChart() {
      var iframeUrl = document.getElementById('iframe-url-input').value.trim();
      var guestToken = document.getElementById('guest-token-input').value.trim().replace(/\s/g, '');
      var container = document.getElementById('chart-container');

      if (!iframeUrl || !guestToken) {
        container.textContent = 'Error: Both iframe_url and guest_token are required.';
        return;
      }

      // Validate URL scheme to prevent javascript: or data: URIs
      if (!iframeUrl.startsWith('http://') && !iframeUrl.startsWith('https://')) {
        container.textContent = 'Error: iframe_url must use http:// or https://';
        return;
      }

      var targetOrigin;
      try {
        targetOrigin = new URL(iframeUrl).origin;
      } catch (e) {
        container.textContent = 'Error: Invalid iframe_url';
        return;
      }

      // Build iframe programmatically (no HTML parsing)
      var iframe = document.createElement('iframe');
      iframe.setAttribute('src', iframeUrl);
      iframe.setAttribute('width', '100%');
      iframe.setAttribute('height', '400');
      iframe.setAttribute('frameborder', '0');
      iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-popups');

      container.textContent = '';
      container.appendChild(iframe);

      iframe.addEventListener('load', function() {
        // Embedded charts use direct postMessage (not MessageChannel)
        // The embeddedChart entry point expects: { type: '__embedded_comms__', guestToken }
        iframe.contentWindow.postMessage(
          { type: '__embedded_comms__', guestToken: guestToken },
          targetOrigin
        );
      });
    }
  </script>
</body>
</html>

name: Embedded SDK Release

on:
  push:
    branches:
      - "master"
      - "[0-9].[0-9]*"

permissions:
  contents: read

jobs:
  build:
    # Publishing uses npm trusted publishing (OIDC), so there is no NPM_TOKEN to
    # gate on. Restrict to the canonical repo: forks cannot mint a valid OIDC
    # token for this package and must not publish.
    if: github.repository == 'apache/superset'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write # required for npm trusted publishing (OIDC)
    defaults:
      run:
        working-directory: superset-embedded-sdk
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: "./superset-embedded-sdk/.nvmrc"
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm run ci:release
        env:
          # actions/setup-node injects a placeholder NODE_AUTH_TOKEN
          # (XXXXX-XXXXX-XXXXX-XXXXX) when registry-url is set, which makes npm
          # attempt failed token auth and skip the OIDC trusted-publishing
          # exchange. Clear it so npm authenticates via OIDC. The Node pinned in
          # .nvmrc (v24.16.0) ships npm 11.13, satisfying the >= 11.5.1
          # trusted-publishing requirement, so no manual npm upgrade is needed.
          NODE_AUTH_TOKEN: ""

name: Check base install

# Minimal, fast installability check: proves `requirements/base.txt` installs
# cleanly and that the resolved dependency set is internally consistent
# (`pip check`). Gives dependency-bump PRs a real green check to verify against.
on:
  push:
    branches:
      - "master"
      - "[0-9].[0-9]*"
  pull_request:
    types: [synchronize, opened, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  check-install:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install base requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/base.txt

      - name: Check dependency consistency
        run: pip check

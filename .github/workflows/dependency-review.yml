name: "Rem Verify"
on:
  pull_request:
    paths:
      - "requirements/**"
      - "pyproject.toml"

jobs:
  install-check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install changed requirements
        run: pip install -r requirements/base.txt
      - name: Verify no broken or conflicting dependencies
        run: pip check

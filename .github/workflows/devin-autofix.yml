name: Devin Autofix

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to run autofix on"
        required: true
        type: number

concurrency:
  group: devin-autofix-${{ github.event.issue.number || inputs.issue_number }}
  cancel-in-progress: false

permissions:
  contents: read
  issues: write
  pull-requests: read
  actions: read

jobs:
  autofix:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'issue_comment' &&
        !github.event.issue.pull_request &&
        startsWith(github.event.comment.body, '/devin-fix')
      )
    steps:
      - name: Check user allowlist
        if: github.event_name == 'issue_comment'
        env:
          COMMENTER: ${{ github.event.comment.user.login }}
        run: |
          ALLOWED_USERS="vickyli1014"
          if [[ ",$ALLOWED_USERS," != *",$COMMENTER,"* ]]; then
            echo "::error::User $COMMENTER is not allowlisted for /devin-fix"
            exit 1
          fi
          echo "User $COMMENTER is allowlisted"

      - name: Validate issue is open
        if: github.event_name == 'issue_comment'
        env:
          ISSUE_STATE: ${{ github.event.issue.state }}
        run: |
          if [[ "$ISSUE_STATE" != "open" ]]; then
            echo "::error::Issue is not open (state: $ISSUE_STATE)"
            exit 1
          fi

      - name: Check for duplicate active runs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number || inputs.issue_number }}
        run: |
          # Check if issue has active autofix labels
          LABELS=$(gh api "/repos/${{ github.repository }}/issues/${ISSUE_NUMBER}/labels" --jq '.[].name')
          if echo "$LABELS" | grep -q "devin-autofix/in-progress"; then
            echo "::error::Issue already has an active autofix run (in-progress)"
            exit 1
          fi
          if echo "$LABELS" | grep -q "devin-autofix/waiting-review"; then
            echo "::error::Issue already has an active autofix run (waiting-review)"
            exit 1
          fi
          echo "No duplicate active runs found"

      - name: Add reaction to trigger comment
        if: github.event_name == 'issue_comment'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method POST \
            "/repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            -f content='+1' || true

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Start Devin autofix session
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
          DEVIN_ORG_ID: ${{ secrets.DEVIN_ORG_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number || inputs.issue_number }}"
          TRIGGER_COMMENT_ID="${{ github.event.comment.id || 0 }}"
          TRIGGERED_BY="${{ github.event.comment.user.login || github.actor }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          python -m scripts.devin_autofix.start_session \
            --issue-number "$ISSUE_NUMBER" \
            --trigger-comment-id "$TRIGGER_COMMENT_ID" \
            --triggered-by "$TRIGGERED_BY" \
            --run-url "$RUN_URL"

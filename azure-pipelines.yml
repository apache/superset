# azure-pipelines-build.yml
# Build & Push Superset Image (Buildx Compatible)

trigger:
  branches:
    include:
      - feature/*

variables:
  containerRegistry: 'IntelliSuite Container Registry'
  acrDomain: 'intellisuite.azurecr.io'
  imageRepository: 'superset'
  dockerfilePath: '$(Build.SourcesDirectory)/Dockerfile'

stages:
  - stage: Build
    displayName: "Build and Push Docker Image"
    jobs:
      - job: BuildAndPush
        displayName: "Build and Push"
        pool:
          name: 'Linux-Hosted'

        steps:

          # Checkout
          - checkout: self
            clean: true
            fetchDepth: 1

          # Compute semantic tag + build date safely
          - task: Bash@3
            displayName: "Set Build Variables"
            inputs:
              targetType: inline
              script: |
                set -e  # Exit on error
                
                BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
                SHORT_SHA=$(echo "$(Build.SourceVersion)" | cut -c1-7)
                SEMANTIC_TAG="$(Build.BuildId)-$SHORT_SHA"

                echo "##vso[task.setvariable variable=BUILD_DATE]$BUILD_DATE"
                echo "##vso[task.setvariable variable=shortCommitSha]$SHORT_SHA"
                echo "##vso[task.setvariable variable=semanticTag]$SEMANTIC_TAG"

                echo "Semantic Tag: $SEMANTIC_TAG"
                echo "Build Date: $BUILD_DATE"

          # Login to ACR (must happen before buildx push)
          - task: Docker@2
            displayName: "Login to ACR"
            inputs:
              command: login
              containerRegistry: $(containerRegistry)

          # Buildx build + push (Docker@2 cannot handle buildx)
          - task: Bash@3
            displayName: "Build and Push via Buildx"
            inputs:
              targetType: inline
              script: |
                set -e  # Exit on error
                
                # Clean up any existing builder
                echo "Cleaning up old builder if exists..."
                docker buildx rm pipelinebuilder 2>/dev/null || true
                
                echo "Initializing buildx..."
                docker buildx create --use --name pipelinebuilder --driver docker-container
                docker buildx inspect --bootstrap

                echo "Building image with Buildx..."
                docker buildx build \
                  --builder pipelinebuilder \
                  --platform linux/amd64 \
                  -f "$(dockerfilePath)" \
                  --build-arg BUILD_ID="$(Build.BuildId)" \
                  --build-arg COMMIT_SHA="$(Build.SourceVersion)" \
                  --build-arg BUILD_DATE="$(BUILD_DATE)" \
                  --label org.opencontainers.image.source="$(Build.Repository.Uri)" \
                  --label org.opencontainers.image.revision="$(Build.SourceVersion)" \
                  --label org.opencontainers.image.created="$(BUILD_DATE)" \
                  -t "$(acrDomain)/$(imageRepository):$(semanticTag)" \
                  -t "$(acrDomain)/$(imageRepository):latest" \
                  --push \
                  "$(Build.SourcesDirectory)"

                echo "Buildx image build & push completed."
                
                # Cleanup builder
                echo "Cleaning up builder..."
                docker buildx rm pipelinebuilder || true

          # Publish deployment metadata
          - task: Bash@3
            displayName: "Create Deployment Metadata"
            inputs:
              targetType: inline
              script: |
                set -e  # Exit on error
                
                # Ensure staging directory exists
                mkdir -p "$(Build.ArtifactStagingDirectory)"
                
                cat > "$(Build.ArtifactStagingDirectory)/deployment-metadata.json" << 'EOF'
                {
                  "imageTag": "$(semanticTag)",
                  "buildId": "$(Build.BuildId)",
                  "commitSha": "$(Build.SourceVersion)",
                  "shortCommitSha": "$(shortCommitSha)",
                  "branchName": "$(Build.SourceBranchName)",
                  "repository": "$(acrDomain)/$(imageRepository)",
                  "fullImageName": "$(acrDomain)/$(imageRepository):$(semanticTag)",
                  "buildDate": "$(BUILD_DATE)",
                  "triggeredBy": "$(Build.RequestedFor)"
                }
                EOF

                cat > "$(Build.ArtifactStagingDirectory)/deployment.env" << 'EOF'
                IMAGE_TAG=$(semanticTag)
                BUILD_ID=$(Build.BuildId)
                COMMIT_SHA=$(Build.SourceVersion)
                SHORT_COMMIT_SHA=$(shortCommitSha)
                FULL_IMAGE_NAME=$(acrDomain)/$(imageRepository):$(semanticTag)
                BUILD_DATE=$(BUILD_DATE)
                EOF

                echo "Metadata files created:"
                ls -la "$(Build.ArtifactStagingDirectory)"

          - task: PublishPipelineArtifact@1
            displayName: "Publish Deployment Artifacts"
            inputs:
              targetPath: "$(Build.ArtifactStagingDirectory)"
              artifact: "deployment-metadata"
              publishLocation: "pipeline"

          - task: Bash@3
            displayName: "Build Summary"
            inputs:
              targetType: inline
              script: |
                echo "=========================================="
                echo "Build Complete"
                echo "Image: $(acrDomain)/$(imageRepository):$(semanticTag)"
                echo "Build ID: $(Build.BuildId)"
                echo "Commit: $(shortCommitSha)"
                echo "Branch: $(Build.SourceBranchName)"
                echo "=========================================="
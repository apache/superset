suite: Secrets tests
tests:
  - it: should create env secret by default
    template: templates/secret-env.yaml
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-superset-env
      - equal:
          path: type
          value: Opaque

  - it: should not create env secret when disabled
    template: templates/secret-env.yaml
    set:
      secretEnv:
        create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should include database environment variables
    template: templates/secret-env.yaml
    set:
      database:
        host: db.example.com
        port: "5432"
        user: superset-user
        password: secret-password
        name: superset-db
    asserts:
      - equal:
          path: stringData.DB_HOST
          value: db.example.com
      - equal:
          path: stringData.DB_PORT
          value: "5432"
      - equal:
          path: stringData.DB_USER
          value: superset-user
      - equal:
          path: stringData.DB_PASS
          value: secret-password
      - equal:
          path: stringData.DB_NAME
          value: superset-db

  - it: should include Redis environment variables when cache is enabled
    template: templates/secret-env.yaml
    set:
      cache:
        enabled: true
        host: redis.example.com
        port: "6379"
        password: redis-password
    asserts:
      - equal:
          path: stringData.REDIS_HOST
          value: redis.example.com
      - equal:
          path: stringData.REDIS_PORT
          value: "6379"
      - equal:
          path: stringData.REDIS_PASSWORD
          value: redis-password

  - it: should set REDIS_PROTO to rediss when SSL is enabled
    template: templates/secret-env.yaml
    set:
      cache:
        enabled: true
        host: redis.example.com
        ssl:
          enabled: true
    asserts:
      - equal:
          path: stringData.REDIS_PROTO
          value: "rediss"

  - it: should set REDIS_PROTO to redis when SSL is disabled
    template: templates/secret-env.yaml
    set:
      cache:
        enabled: true
        host: redis.example.com
        ssl:
          enabled: false
    asserts:
      - equal:
          path: stringData.REDIS_PROTO
          value: "redis"

  - it: should include extra secret env variables
    template: templates/secret-env.yaml
    set:
      extraSecretEnv:
        CUSTOM_KEY: custom-value
        ANOTHER_SECRET: another-value
    asserts:
      - equal:
          path: stringData.CUSTOM_KEY
          value: custom-value
      - equal:
          path: stringData.ANOTHER_SECRET
          value: another-value

  - it: should create config secret
    template: templates/secret-superset-config.yaml
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-superset-config

  - it: should include superset_config.py in config secret
    template: templates/secret-superset-config.yaml
    asserts:
      - isNotNull:
          path: stringData["superset_config.py"]

  - it: should include health_check.py in config secret
    template: templates/secret-superset-config.yaml
    asserts:
      - isNotNull:
          path: stringData["health_check.py"]

  - it: should include superset_bootstrap.sh in config secret
    template: templates/secret-superset-config.yaml
    asserts:
      - isNotNull:
          path: stringData["superset_bootstrap.sh"]

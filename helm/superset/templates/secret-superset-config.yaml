apiVersion: v1
kind: Secret
metadata:
  name: {{ template "superset.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
    {{- if .Values.preInstallValidation.enabled }}
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
    {{- end }}
  labels:
    {{- include "superset.labels" . | nindent 4 }}
    {{- if .Values.extraLabels }}
      {{- toYaml .Values.extraLabels | nindent 4 }}
    {{- end }}
type: Opaque
stringData:
  superset_config.py: |
    {{- include "superset.config" . | nindent 4 }}
  superset_init.sh: |
    {{- include "superset.initScript" . | nindent 4 }}
  superset_bootstrap.sh: |
    #!/bin/bash
    set -e
    {{- /* Install optional dependencies if configured (for POC/dev - production should use custom image) */}}
    {{- if .Values.optionalDependencies }}
    uv pip install .[{{- range $index, $dep := .Values.optionalDependencies }}{{- if $index }},{{- end }}{{ $dep }}{{- end }}]
    {{- end }}
    {{- if .Values.supersetCeleryFlower.enabled }}
    uv pip install 'flower<1.0.0'
    {{- end }}
    {{- tpl .Values.bootstrapScript . | nindent 4 }}
  health_check.py: |
    #!/usr/bin/env python3
    """Health check script for Kubernetes probes
    
    Supports both traditional process-based checks and file-based Celery health checks.
    File-based checks are recommended for Celery workers in Kubernetes.
    See: https://medium.com/ambient-innovation/health-checks-for-celery-in-kubernetes-cf3274a3e106
    """
    import os
    import sys
    import time

    # File paths for Celery worker health checks (injected from values.yaml at deploy time)
    READINESS_FILE = {{ .Values.supersetWorker.healthCheck.readinessFile | default "/tmp/celery_worker_ready" | quote }}
    LIVENESS_FILE = {{ .Values.supersetWorker.healthCheck.livenessFile | default "/tmp/celery_worker_alive" | quote }}
    # Maximum age in seconds for liveness file before considering worker unhealthy
    # Should be greater than livenessHeartbeatInterval ({{ .Values.supersetWorker.healthCheck.livenessHeartbeatInterval | default 10 }}s)
    LIVENESS_MAX_AGE = 60

    def check_celery_startup():
        """Check if Celery worker has started (startup probe)
        
        For startup, we check if either:
        1. The readiness file exists (worker is fully ready), or
        2. The Celery process is running (worker is starting up)
        """
        # First check if readiness file exists (worker is ready)
        if os.path.exists(READINESS_FILE):
            print("✓ Celery worker readiness file exists")
            return True
        
        # Fall back to process check during startup
        return check_process_health()

    def check_celery_liveness():
        """Check if Celery worker is alive using file-based heartbeat (liveness probe)
        
        The Celery worker's LivenessProbeStep bootstep periodically touches a file.
        This check verifies the file exists and was recently updated.
        """
        if not os.path.exists(LIVENESS_FILE):
            print(f"✗ Liveness file not found: {LIVENESS_FILE}")
            return False
        
        try:
            # Check file modification time
            mtime = os.path.getmtime(LIVENESS_FILE)
            age = time.time() - mtime
            
            if age > LIVENESS_MAX_AGE:
                print(f"✗ Liveness file is stale (age: {age:.1f}s, max: {LIVENESS_MAX_AGE}s)")
                return False
            
            print(f"✓ Celery worker is alive (heartbeat age: {age:.1f}s)")
            return True
        except Exception as e:
            print(f"✗ Failed to check liveness file: {e}")
            return False

    def check_celery_readiness():
        """Check if Celery worker is ready to process tasks (readiness probe)
        
        The Celery worker creates a readiness file when it receives the worker_ready signal.
        """
        if os.path.exists(READINESS_FILE):
            print("✓ Celery worker is ready")
            return True
        else:
            print(f"✗ Celery worker not ready (file not found: {READINESS_FILE})")
            return False

    def check_process_health():
        """Check if the main Superset/Celery process is running and healthy
        
        Uses /proc filesystem instead of pgrep (which may not be available in minimal containers)
        """
        try:
            # Search /proc for celery or superset processes
            import glob
            
            for proc_dir in glob.glob('/proc/[0-9]*'):
                try:
                    cmdline_path = os.path.join(proc_dir, 'cmdline')
                    with open(cmdline_path, 'r') as f:
                        cmdline = f.read()
                    # Check if this is a celery or superset process
                    if 'celery' in cmdline and 'superset' in cmdline:
                        pid = os.path.basename(proc_dir)
                        print(f"✓ Celery/Superset process is running (PID: {pid})")
                        return True
                except (IOError, OSError):
                    # Process may have exited, skip
                    continue
            
            print("✗ No Celery/Superset process found")
            return False
            
        except Exception as e:
            print(f"✗ Process check failed: {e}")
            return False

    if __name__ == '__main__':
        # Parse command line arguments
        if len(sys.argv) > 1:
            check_type = sys.argv[1]
            
            if check_type == '--celery-startup':
                print("Running Celery startup check...")
                success = check_celery_startup()
            elif check_type == '--celery-liveness':
                print("Running Celery liveness check...")
                success = check_celery_liveness()
            elif check_type == '--celery-readiness':
                print("Running Celery readiness check...")
                success = check_celery_readiness()
            else:
                print(f"Unknown check type: {check_type}")
                print("Usage: health_check.py [--celery-startup|--celery-liveness|--celery-readiness]")
                sys.exit(1)
        else:
            # Default: check process health (liveness/startup probe)
            print("Running process health checks...")
            success = check_process_health()

        if success:
            print("Health check passed")
            sys.exit(0)
        else:
            print("Health check failed")
            sys.exit(1)

  pre_install_validation.py: |
    #!/usr/bin/env python3
    """Pre-install validation script that verifies database and Redis connectivity before deployment"""
    import os
    import sys
    
    def validate_database():
        """Verify database connection using SQLAlchemy (core dependency)
        
        SQLAlchemy is a core dependency of Superset and should be available.
        If it's not available, this indicates a problem with the Superset image.
        """
        try:
            from sqlalchemy import create_engine, text
        except ImportError:
            print("ERROR: SQLAlchemy is not available in the Superset image")
            print("  SQLAlchemy is a core dependency and should be installed.")
            print("  Please verify the Superset image includes all core dependencies.")
            return False
        
        try:
            db_uri = os.getenv('SQLALCHEMY_DATABASE_URI')
            host = os.getenv('DB_HOST')
            port = os.getenv('DB_PORT')
            user = os.getenv('DB_USER')
            password = os.getenv('DB_PASS')
            name = os.getenv('DB_NAME')
            
            if not db_uri:
                # Build URI from components
                if not all([user, host, port, name]):
                    print("ERROR: Database connection not fully configured (DB_USER, DB_HOST, DB_PORT, DB_NAME required)")
                    return False
                
                # Password can be empty if using external secrets (will come from envFrom)
                if password is None:
                    password = ""
                
                # Build URI with SSL if configured
                ssl_mode = os.getenv('DB_SSL_MODE')
                driver = os.getenv('DB_DRIVER', 'postgresql+psycopg2')
                ssl_params = f"?sslmode={ssl_mode}" if ssl_mode else ""
                db_uri = f"{driver}://{user}:{password}@{host}:{port}/{name}{ssl_params}"
            
            print(f"Connecting to database at {host if host else 'URI'}...")
            
            # Configure SSL connection args if SSL mode is set
            connect_args = {"connect_timeout": 10}
            ssl_mode = os.getenv('DB_SSL_MODE')
            if ssl_mode:
                connect_args["sslmode"] = ssl_mode
            
            engine = create_engine(db_uri, connect_args=connect_args)
            with engine.connect() as conn:
                result = conn.execute(text("SELECT 1"))
                result.fetchone()
            
            print("✓ Database connection successful")
            return True
        except ImportError as e:
            # Database driver is missing
            error_msg = str(e)
            print(f"ERROR: Database driver not available: {e}")
            print("  The required database driver is not installed.")
            print("  Install it by adding the appropriate optional dependency to Superset:")
            print("  - In Helm: Set optionalDependencies in values.yaml (e.g., ['postgres'] for PostgreSQL)")
            print("  - In Docker: pip install .[<dependency-name>]")
            print("  Falling back to TCP connectivity test...")
            return validate_database_tcp()
        except Exception as e:
            error_msg = str(e)
            # Check if it's a driver-related error
            if 'No module named' in error_msg or 'No such module' in error_msg:
                print(f"ERROR: Database driver missing: {e}")
                print("  Please install the required database driver via optionalDependencies in values.yaml")
                print("  Falling back to TCP connectivity test...")
                return validate_database_tcp()
            
            print(f"✗ Database connection failed: {e}")
            print("  Please verify:")
            print("  - Database server is accessible from Kubernetes cluster")
            print("  - Database credentials are correct")
            print("  - Database exists and user has proper permissions")
            print("  - Network policies allow connection to database")
            print("  Attempting TCP connectivity test as fallback...")
            return validate_database_tcp()
    
    def validate_database_tcp():
        """Basic TCP connection test - verifies network connectivity to database host/port
        
        This is the primary validation method since Superset doesn't ship with database
        drivers. Full database authentication will be validated when Superset starts.
        """
        try:
            import socket
            host = os.getenv('DB_HOST')
            port = int(os.getenv('DB_PORT', 5432))
            
            if not host:
                print("ERROR: DB_HOST not set")
                return False
            
            sock = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
            sock.settimeout(10)
            result = sock.connect_ex((host, port))
            sock.close()
            
            if result == 0:
                print("✓ TCP connection to database port successful")
                print("  Note: Network connectivity verified. Full database authentication")
                print("        will be validated when Superset starts (requires database driver).")
                return True
            else:
                print(f"✗ TCP connection failed (error code: {result})")
                print("  Please verify:")
                print("  - Database host is correct and accessible from Kubernetes cluster")
                print("  - Database port is correct and not blocked by firewall")
                print("  - Network policies allow outbound connections to database")
                return False
        except socket.gaierror as e:
            print(f"✗ DNS resolution failed for {host}: {e}")
            print("  Please verify the database hostname is correct and DNS is working")
            return False
        except Exception as e:
            print(f"✗ TCP connection test failed: {e}")
            return False
    
    def validate_redis():
        """Verify Redis connection"""
        try:
            import redis
            
            host = os.getenv('REDIS_HOST')
            port = int(os.getenv('REDIS_PORT', 6379))
            password = os.getenv('REDIS_PASSWORD')
            ssl = os.getenv('REDIS_PROTO') == 'rediss'
            
            if not host:
                print("WARNING: Redis not configured (REDIS_HOST not set)")
                return True  # Redis is optional
            
            print(f"Connecting to Redis at {host}:{port}...")
            r = redis.Redis(
                host=host,
                port=port,
                password=password,
                ssl=ssl,
                socket_connect_timeout=10,
                decode_responses=False
            )
            r.ping()
            print("✓ Redis connection successful")
            return True
        except ImportError:
            print("WARNING: redis-py not available - skipping Redis validation")
            return True
        except Exception as e:
            print(f"✗ Redis connection failed: {e}")
            print("  Please verify:")
            print("  - Redis server is accessible from Kubernetes cluster")
            print("  - Redis credentials are correct (if authentication enabled)")
            print("  - Redis is running and accepting connections")
            return False
    
    def validate_resource_limits():
        """Warn if resource limits are not set (production recommendation)"""
        # Note: We can't directly access Helm values from the validation script
        # Resource limit validation is handled by Helm template validation
        # This function is kept for future enhancements
        print("Resource limits should be set for production deployments")
        print("  Set resources.limits and resources.requests in values.yaml")
        return True  # Warning only, not a failure
    
    if __name__ == '__main__':
        print("=" * 60)
        print("Pre-install Validation")
        print("=" * 60)
        all_passed = True
        
        # Database is always required
        print("\n[1/2] Validating database connection...")
        db_ok = validate_database()
        if not db_ok:
            all_passed = False
        
        # Redis validation (if enabled)
        redis_check = os.getenv('REDIS_HOST')
        if redis_check:
            print("\n[2/2] Validating Redis connection...")
            redis_ok = validate_redis()
            if not redis_ok:
                all_passed = False
        else:
            print("\n[2/2] Skipping Redis validation (not configured)")
        
        print("\n" + "=" * 60)
        if all_passed:
            print("✓ All pre-install validations passed")
            print("=" * 60)
            sys.exit(0)
        else:
            print("✗ Pre-install validation failed")
            print("=" * 60)
            print("\nPlease fix the errors above before proceeding with installation.")
            sys.exit(1)

  {{- if .Values.extraSecrets }}
  {{- range $path, $config := .Values.extraSecrets }}
  {{ $path }}: |
    {{- tpl $config $ | nindent 4 -}}
  {{- end -}}
  {{- end -}}

{{- /* Upgrade job for DB migrations and role initialization */}}
{{- /* Runs on EVERY deployment (install and upgrade) before init job */}}
{{- /* Init job only runs on install for admin creation and examples */}}

{{- if and .Values.init.enabled .Values.init.upgradeJob.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ template "superset.fullname" . }}-upgrade-db
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "superset.componentLabels" (dict "component" "upgrade" "root" .) | nindent 4 }}
  {{- if .Values.init.upgradeJob.jobAnnotations }}
  annotations: {{- toYaml .Values.init.upgradeJob.jobAnnotations | nindent 4 }}
  {{- end }}
spec:
  backoffLimit: 3
  template:
    metadata:
      name: {{ template "superset.fullname" . }}-upgrade-db
      {{- if .Values.init.podAnnotations }}
      annotations: {{- toYaml .Values.init.podAnnotations | nindent 8 }}
      {{- end }}
      {{- if or .Values.extraLabels .Values.init.podLabels }}
      labels:
        {{- if .Values.extraLabels }}
          {{- toYaml .Values.extraLabels | nindent 8 }}
        {{- end }}
        {{- if .Values.init.podLabels }}
          {{- toYaml .Values.init.podLabels | nindent 8 }}
        {{- end }}
      {{- end }}
    spec:
      terminationGracePeriodSeconds: 60
      {{- if or .Values.serviceAccount.create .Values.serviceAccount.name }}
      serviceAccountName: {{ template "superset.serviceAccountName" . }}
      {{- end }}
      securityContext:
        {{- if .Values.init.podSecurityContext }}
          {{- toYaml .Values.init.podSecurityContext | nindent 8 }}
        {{- else }}
        runAsUser: {{ .Values.runAsUser }}
        {{- if ne (int .Values.runAsUser) 0 }}
        runAsNonRoot: true
        {{- end }}
        fsGroup: {{ .Values.runAsUser }}
        seccompProfile:
          type: RuntimeDefault
        {{- end }}
      {{- if .Values.init.initContainers }}
      initContainers: {{-  tpl (toYaml .Values.init.initContainers) . | nindent 6 }}
      {{- else }}
      {{- $defaultInitContainers := include "superset.defaultInitContainers" . }}
      {{- if $defaultInitContainers }}
      initContainers: {{- $defaultInitContainers | nindent 6 }}
      {{- end }}
      {{- end }}
      containers:
      - name: {{ template "superset.name" . }}-upgrade-db
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        env:
          {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 10 }}
          {{- end }}
        envFrom:
          - secretRef:
              name: {{ tpl .Values.envFromSecret . }}
          {{- range .Values.envFromSecrets }}
          - secretRef:
              name: {{ tpl . $ | quote }}
          {{- end }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        {{- if .Values.init.containerSecurityContext }}
        securityContext: {{- toYaml .Values.init.containerSecurityContext | nindent 12 }}
        {{- else }}
        securityContext:
          allowPrivilegeEscalation: false
          {{- if ne (int .Values.runAsUser) 0 }}
          runAsNonRoot: true
          {{- end }}
          runAsUser: {{ .Values.runAsUser }}
          capabilities:
            drop:
              - ALL
        {{- end }}
        volumeMounts:
          - name: superset-config
            mountPath: {{ .Values.configMountPath | quote }}
            readOnly: true
          {{- if .Values.extraConfigs }}
          - name: superset-extra-config
            mountPath: {{ .Values.extraConfigMountPath | quote }}
            readOnly: true
          {{- end }}
          {{- with .Values.extraVolumeMounts }}
            {{- tpl (toYaml .) $ | nindent 10 -}}
          {{- end }}
        # Only run DB migrations, not admin creation or examples loading
        command:
          - "/bin/sh"
          - "-c"
          - |
            set -eu
            echo "Upgrading DB schema..."
            superset db upgrade
            echo "Initializing roles..."
            superset init
            echo "Upgrade complete."
        resources: {{- toYaml .Values.init.resources | nindent 10 }}
      {{- with .Values.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or .Values.affinity .Values.init.affinity }}
      affinity:
        {{- with .Values.affinity }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.init.affinity }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- if .Values.init.priorityClassName }}
      priorityClassName: {{ .Values.init.priorityClassName }}
      {{- end }}
      {{- if or .Values.topologySpreadConstraints .Values.init.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- with .Values.topologySpreadConstraints }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.init.topologySpreadConstraints }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      volumes:
        - name: superset-config
          secret:
            secretName: {{ tpl .Values.configFromSecret . }}
            defaultMode: 0400
        {{- if .Values.extraConfigs }}
        - name: superset-extra-config
          configMap:
            name: {{ template "superset.fullname" . }}-extra-config
            defaultMode: 0444
        {{- end }}
        {{- with .Values.extraVolumes }}
          {{- tpl (toYaml .) $ | nindent 8 -}}
        {{- end }}
      restartPolicy: Never
{{- end }}

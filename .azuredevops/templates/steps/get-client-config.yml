parameters:
  - name: targetEnvironment
    type: string

variables:
  - group: blue-dev-superset-secret   # <-- attach your variable group here

steps:
  - bash: |
      set -euo pipefail
      echo "Rehydrating ${{ parameters.targetEnvironment }} client config..."

      CLIENT_CONFIG="$CLIENT_CONFIG_JSON"

      if [ -z "$CLIENT_CONFIG" ]; then
        echo "ERROR: CLIENT_CONFIG is empty"
        exit 1
      fi

      CFG_FILE=$(mktemp --suffix=-${{ parameters.targetEnvironment }}-config.json)
      echo "$CLIENT_CONFIG" > "$CFG_FILE"
      echo "Config written to $CFG_FILE"

      echo "##vso[task.setvariable variable=cfgPath]$CFG_FILE"

      if ! jq empty "$CFG_FILE"; then
        echo "ERROR: Config is not valid JSON"
        exit 1
      fi
      echo "JSON validation passed"
    displayName: "Rehydrate & Validate ${{ parameters.targetEnvironment }} Config"

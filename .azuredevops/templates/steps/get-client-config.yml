parameters:
  - name: targetEnvironment
    type: string

steps:
  - bash: |
      set -e
      echo "Creating client-config.json from variable group..."

      if [ -z "$(CLIENT_CONFIG_JSON)" ]; then
        echo "ERROR: CLIENT_CONFIG_JSON is not set"
        exit 1
      fi

      mkdir -p $(Build.SourcesDirectory)/config
      echo '$(CLIENT_CONFIG_JSON)' > $(Build.SourcesDirectory)/config/client-config.json

      echo "Client config written to:"
      echo "$(Build.SourcesDirectory)/config/client-config.json"

      jq '.' $(Build.SourcesDirectory)/config/client-config.json
    displayName: 'Create client-config.json'

  - bash: |
      echo "##vso[task.setvariable variable=cfgPath]$(Build.SourcesDirectory)/config/client-config.json"
    displayName: 'Expose client-config path'

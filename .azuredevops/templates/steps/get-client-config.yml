parameters:
  - name: targetEnvironment
    type: string

steps:
  - bash: |
      echo "Creating client-config.json..."

      if [ -z "$CLIENT_CONFIG_JSON" ]; then
        echo "ERROR: CLIENT_CONFIG_JSON is not set"
        exit 1
      fi

      # Write JSON to file (allow variable expansion)
      cat << EOF > client-config.json
$CLIENT_CONFIG_JSON
EOF

      echo "client-config.json created successfully"
      echo "##vso[task.setvariable variable=cfgPath]$(System.DefaultWorkingDirectory)/client-config.json"
    displayName: Create client-config.json
    env:
      CLIENT_CONFIG_JSON: $(CLIENT_CONFIG_JSON)

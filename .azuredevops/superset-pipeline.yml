trigger: none
pr: none

parameters:
  - name: targetEnvironment
    type: string
    default: blue-dev

  - name: dockerPool
    type: string
    displayName: Docker Agent Pool
    default: 'Linux-Hosted'

  # SECRET_KEY is now sourced from blue-dev secret (client-config JSON)
  # Removed hardcoded pipeline parameter - using centralized secret management

variables:
  appName: superset
  containerRegistry: 'IntelliSuite Container Registry'
  acrDomain: 'intellisuite.azurecr.io'
  imageRepository: 'superset'
  dockerfilePath: '$(Build.SourcesDirectory)/Dockerfile'
  artifactName: superset-deployment
  vmImageName: 'ubuntu-latest'

stages:
# =====================================================
# BUILD STAGE
# =====================================================
- stage: Build
  displayName: Build Superset Docker Image
  jobs:
    - job: BuildDocker
      displayName: Build and Push Docker Image
      pool:
        vmImage: ubuntu-latest
      steps:
        - checkout: self
          fetchDepth: 0
          submodules: true
          persistCredentials: true

        - bash: |
            echo "=== Validating workspace structure ==="
            echo "Current directory: $(pwd)"
            echo "Build.SourcesDirectory: $(Build.SourcesDirectory)"
            echo ""
            echo "Checking docker directory..."
            if [ -d "$(Build.SourcesDirectory)/docker" ]; then
              echo "✓ docker directory exists"
              ls -la "$(Build.SourcesDirectory)/docker"
            else
              echo "✗ docker directory NOT found"
              exit 1
            fi
            echo ""
            echo "Checking docker-entrypoint-initdb.d..."
            if [ -d "$(Build.SourcesDirectory)/docker/docker-entrypoint-initdb.d" ]; then
              echo "✓ docker-entrypoint-initdb.d exists"
              ls -la "$(Build.SourcesDirectory)/docker/docker-entrypoint-initdb.d"
            else
              echo "✗ docker-entrypoint-initdb.d NOT found"
              exit 1
            fi
            echo ""
            echo "Checking submodules..."
            if [ -d "$(Build.SourcesDirectory)/.github/actions" ]; then
              echo "✓ .github/actions exists"
              ls -la "$(Build.SourcesDirectory)/.github/actions"
            else
              echo "✗ .github/actions NOT found"
            fi
            echo "=== Workspace validation completed ==="
          displayName: Validate Workspace Structure

        - bash: |
            BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            SHORT_SHA=$(echo "$(Build.SourceVersion)" | cut -c1-7)
            SEMANTIC_TAG="$(Build.BuildId)-$SHORT_SHA"

            echo "##vso[task.setvariable variable=BUILD_DATE]$BUILD_DATE"
            echo "##vso[task.setvariable variable=shortCommitSha]$SHORT_SHA"
            echo "##vso[task.setvariable variable=semanticTag]$SEMANTIC_TAG"
          displayName: Set Build Variables

        - task: Docker@2
          displayName: Login to ACR
          inputs:
            command: login
            containerRegistry: $(containerRegistry)

        - task: Docker@2
          displayName: Build Docker Image
          inputs:
            command: build
            containerRegistry: $(containerRegistry)
            repository: $(imageRepository)
            Dockerfile: $(dockerfilePath)
            buildContext: $(Build.SourcesDirectory)
            tags: |
              $(semanticTag)
              latest

        - task: Docker@2
          displayName: Push Docker Image
          inputs:
            command: push
            containerRegistry: $(containerRegistry)
            repository: $(imageRepository)
            tags: |
              $(semanticTag)
              latest

        - bash: |
            mkdir -p $(Build.ArtifactStagingDirectory)
            cat > $(Build.ArtifactStagingDirectory)/deployment.env << EOF
            FULL_IMAGE_NAME=$(acrDomain)/$(imageRepository):$(semanticTag)
            EOF
          displayName: Create Deployment Artifact

        - publish: $(Build.ArtifactStagingDirectory)
          artifact: $(artifactName)

# =====================================================
# DEPLOY STAGE
# =====================================================
- stage: Deploy
  displayName: Deploy to ${{ parameters.targetEnvironment }}
  dependsOn: Build
  variables:
    - group: ${{ parameters.targetEnvironment }}-secret   # Dynamic variable group based on targetEnvironment
  
  jobs:
    - deployment: DeploySuperset
      displayName: Deploy Superset to ${{ parameters.targetEnvironment }}
      environment:
        name: ${{ parameters.targetEnvironment }}
        resourceType: VirtualMachine
      workspace:
        clean: all
      strategy:
        runOnce:
          deploy:
            steps:
              - checkout: self
                submodules: true

              - bash: |
                  echo "=== DEBUG: Setting Working Directory ==="
                  echo "Current directory: $(pwd)"
                  echo "Pipeline.Workspace: $(Pipeline.Workspace)"
                  echo ""
                  echo "Changing to Pipeline.Workspace/s..."
                  cd "$(Pipeline.Workspace)/s" || { echo "Failed to cd to $(Pipeline.Workspace)/s"; exit 1; }
                  echo "✓ Changed directory to: $(pwd)"
                  echo ""
                  echo "Contents of current directory:"
                  ls -la
                  echo ""
                  echo "=== END DEBUG ==="
                displayName: Set Working Directory

              - bash: |
                  echo "=== Validating deployment workspace ==="
                  echo "Pipeline.Workspace: $(Pipeline.Workspace)"
                  echo ""
                  echo "Checking docker-entrypoint-initdb.d..."
                  if [ -d "$(Pipeline.Workspace)/s/docker/docker-entrypoint-initdb.d" ]; then
                    echo "✓ docker-entrypoint-initdb.d exists"
                    ls -la "$(Pipeline.Workspace)/s/docker/docker-entrypoint-initdb.d"
                  else
                    echo "✗ docker-entrypoint-initdb.d NOT found at $(Pipeline.Workspace)/s/docker/"
                    echo "Available directories in workspace root:"
                    ls -la "$(Pipeline.Workspace)/s/"
                    exit 1
                  fi
                  echo "=== Deployment workspace validation completed ==="
                displayName: Validate Deployment Workspace

              - download: current
                artifact: $(artifactName)

              # -------------------------------------
              # Login to ACR on deployment VM
              # -------------------------------------
              - task: Docker@2
                displayName: Login to ACR
                inputs:
                  command: login
                  containerRegistry: $(containerRegistry)

              # -------------------------------------
              # Rehydrate & validate client config
              # -------------------------------------
              - task: PowerShell@2
                displayName: 'Rehydrate & validate client config'
                env:
                  CLIENT_CONFIG: $(blue-dev-secret)
                inputs:
                  pwsh: true
                  targetType: inline
                  script: |
                    Write-Host "=== Starting config rehydration ==="
                    
                    # Get the secret variable
                    $raw = $env:CLIENT_CONFIG
                    
                    if ([string]::IsNullOrEmpty($raw)) {
                        throw "CLIENT_CONFIG (blue-dev-secret from Key Vault) is empty or not set"
                    }
                    
                    Write-Host "Retrieved config (length: $($raw.Length) chars)"
                    
                    # Detect and decode base64 if applicable
                    $jsonContent = $raw
                    
                    try {
                        $bytes = [System.Convert]::FromBase64String($raw)
                        $decoded = [System.Text.Encoding]::UTF8.GetString($bytes)
                        
                        if ($decoded.TrimStart().StartsWith('{') -or $decoded.TrimStart().StartsWith('[')) {
                            Write-Host "✓ Config decoded from base64"
                            $jsonContent = $decoded
                        }
                    } catch {
                        Write-Host "Config is not base64-encoded, using as raw JSON"
                    }
                    
                    # Write to temp file
                    $out = Join-Path "$(Agent.TempDirectory)" "blue-dev-config.json"
                    Set-Content -Path $out -Value $jsonContent -Encoding UTF8 -NoNewline
                    Write-Host "✓ Config written to: $out"
                    Write-Host "##vso[task.setvariable variable=cfgPath]$out"
                    
                    # Parse JSON
                    try { 
                        $cfg = Get-Content -Raw -Path $out | ConvertFrom-Json
                        Write-Host "✓ JSON parsed successfully"
                    } catch { 
                        throw "Config is not valid JSON: $($_.Exception.Message)" 
                    }
                    
                    # Validate structure
                    if (-not $cfg.'app-suite') {
                        throw "Config missing 'app-suite' property"
                    }
                    
                    if ($cfg.'app-suite'.Count -eq 0) {
                        throw "Config 'app-suite' array is empty"
                    }
                    
                    # Extract Superset (Explorer) and Postgres info
                    $appSuite = $cfg.'app-suite'[0]

                    if (-not $appSuite.explorer) {
                        throw "Config missing 'explorer' section in app-suite[0]"
                    }

                    if (-not $appSuite.postgres) {
                        throw "Config missing 'postgres' section in app-suite[0]"
                    }

                    $explorer = $appSuite.explorer
                    $pg = $appSuite.postgres

                    # Validate required Explorer fields
                    $requiredExplorerFields = @('port', 'admin-user', 'admin-password')
                    foreach ($field in $requiredExplorerFields) {
                        if (-not $explorer.$field) {
                            throw "Config missing required Explorer field: '$field'"
                        }
                    }

                    Write-Host "✓ Config structure validated"

                    # Superset (Explorer) variables
                    Write-Host "Setting Superset variables..."
                    Write-Host "  Port: $($explorer.port)"
                    Write-Host "  Admin User: $($explorer.'admin-user')"

                    Write-Host "##vso[task.setvariable variable=SUPERSET_PORT]$($explorer.port)"
                    Write-Host "##vso[task.setvariable variable=SUPERSET_ADMIN_USER]$($explorer.'admin-user')"

                    # Extract Superset SECRET_KEY from client config
                    $supersetSecretKey = $cfg.'superset-secret-key'

                    if ([string]::IsNullOrWhiteSpace($supersetSecretKey)) {
                        Write-Host "ERROR: superset-secret-key not found in client-config"
                        Write-Host "ERROR: Add 'superset-secret-key' to the root of your client-config JSON"
                        exit 1
                    }

                    Write-Host "✓ SECRET_KEY extracted from client config"
                    Write-Host "##vso[task.setvariable variable=SUPERSET_SECRET_KEY;issecret=true]$supersetSecretKey"

                    # Set admin password as pipeline variable (for deployment stage)
                    Write-Host "##vso[task.setvariable variable=SUPERSET_ADMIN_PASSWORD;issecret=true]$($explorer.'admin-password')"
                    Write-Host "✓ Admin password set as pipeline variable"

                    # Write admin password to temp file (for Create .env.deploy task on build agent)
                    $adminPasswordFile = Join-Path "$(Agent.TempDirectory)" "superset-admin-password.txt"
                    Set-Content -Path $adminPasswordFile -Value $explorer.'admin-password' -NoNewline
                    Write-Host "✓ Admin password written to temp file"

                    # Docker network
                    Write-Host "Setting Docker network..."
                    Write-Host "##vso[task.setvariable variable=DOCKER_NETWORK]superset-network"
                    
                    Write-Host "✓ All variables set successfully"
                    Write-Host "=== Config rehydration completed ==="

              # -------------------------------------
              # Load deployment artifact
              # -------------------------------------
              - bash: |
                  source $(Pipeline.Workspace)/$(artifactName)/deployment.env
                  echo "##vso[task.setvariable variable=FULL_IMAGE_NAME]$FULL_IMAGE_NAME"
                  echo "Using image: $FULL_IMAGE_NAME"
                displayName: Load Deployment Variables

              - bash: |
                  echo "Setting DOCKER_INITDB_DIR to workspace path..."
                  echo "##vso[task.setvariable variable=DOCKER_INITDB_DIR]$(Pipeline.Workspace)/s/docker/docker-entrypoint-initdb.d"
                  echo "✓ DOCKER_INITDB_DIR set to: $(Pipeline.Workspace)/s/docker/docker-entrypoint-initdb.d"
                displayName: Set Docker InitDB Directory Path

              # -------------------------------------
              # Debug: Print all available variables
              # -------------------------------------
              - bash: |
                  echo "=== DEBUGGING: Printing all pipeline variables ==="
                  echo ""
                  echo "Pipeline variables (Azure DevOps syntax):"
                  echo "  FULL_IMAGE_NAME: '$(FULL_IMAGE_NAME)'"
                  echo "  SUPERSET_SECRET_KEY: '***masked***'"
                  echo "  SUPERSET_ADMIN_USER: '$(SUPERSET_ADMIN_USER)'"
                  echo "  SUPERSET_PORT: '$(SUPERSET_PORT)'"
                  echo "  DOCKER_NETWORK: '$(DOCKER_NETWORK)'"
                  echo "  DOCKER_INITDB_DIR: '$(DOCKER_INITDB_DIR)'"
                  echo ""
                  echo "Environment variables in this shell:"
                  env | grep -E "FULL_IMAGE_NAME|SUPERSET|DOCKER_NETWORK|DOCKER_INITDB_DIR" || echo "  (none found)"
                  echo ""
                  echo "=== END DEBUGGING ==="
                displayName: Debug Variables

              # -------------------------------------
              # Create docker-compose env file
              # -------------------------------------
              - bash: |
                  echo "=== DEBUG: .env.deploy Creation ==="
                  echo "Current working directory: $(pwd)"
                  echo "Pipeline.Workspace: $(Pipeline.Workspace)"
                  echo ""
                  echo "Changing to deployment directory..."
                  cd "$(Pipeline.Workspace)/s" || { echo "✗ ERROR: Failed to cd to $(Pipeline.Workspace)/s"; exit 1; }
                  echo "✓ Changed directory to: $(pwd)"
                  echo ""
                  echo "Files in current directory:"
                  ls -la
                  echo ""
                  echo "Creating .env.deploy file..."

                  # Read admin password from temp file (written by PowerShell step)
                  # Secret variables are not passed to bash, so we use a file
                  ADMIN_PASSWORD_FILE="$(Agent.TempDirectory)/superset-admin-password.txt"
                  if [ -f "$ADMIN_PASSWORD_FILE" ]; then
                    SUPERSET_ADMIN_PASSWORD=$(cat "$ADMIN_PASSWORD_FILE")
                    echo "✓ Read admin password from temp file"
                  else
                    echo "✗ ERROR: Admin password file not found: $ADMIN_PASSWORD_FILE"
                    exit 1
                  fi

                  # Create .env.deploy file with proper escaping for special characters
                  # Using printf to avoid shell interpretation issues
                  cat > .env.deploy << EOF
                  SUPERSET_IMAGE=${FULL_IMAGE_NAME}
                  SUPERSET_SECRET_KEY=${SUPERSET_SECRET_KEY}
                  SUPERSET_ADMIN_USER=${SUPERSET_ADMIN_USER}
                  SUPERSET_ADMIN_PASSWORD=${SUPERSET_ADMIN_PASSWORD}
                  SUPERSET_PORT=${SUPERSET_PORT}
                  DATABASE_DIALECT=postgresql
                  DATABASE_USER=superset
                  DATABASE_PASSWORD=superset
                  DATABASE_HOST=db
                  DATABASE_PORT=5432
                  DATABASE_DB=superset
                  REDIS_HOST=redis
                  REDIS_PORT=6379
                  DOCKER_NETWORK=${DOCKER_NETWORK}
                  DOCKER_INITDB_DIR=${DOCKER_INITDB_DIR}
                  EOF

                  echo "✓ Created .env.deploy file"
                  echo ""
                  echo ".env.deploy file location:"
                  ls -la .env.deploy
                  echo ""
                  echo "=== DEBUG: Variable value lengths ==="
                  echo "SUPERSET_SECRET_KEY length: ${#SUPERSET_SECRET_KEY}"
                  echo "SUPERSET_ADMIN_USER length: ${#SUPERSET_ADMIN_USER}"
                  echo "SUPERSET_ADMIN_PASSWORD length: ${#SUPERSET_ADMIN_PASSWORD}"
                  echo "SUPERSET_PORT length: ${#SUPERSET_PORT}"
                  echo ""
                  if [ -z "$SUPERSET_SECRET_KEY" ]; then
                    echo "✗ ERROR: SUPERSET_SECRET_KEY is empty!"
                    exit 1
                  fi
                  if [ -z "$SUPERSET_ADMIN_PASSWORD" ]; then
                    echo "✗ ERROR: SUPERSET_ADMIN_PASSWORD is empty!"
                    exit 1
                  fi
                  echo "✓ All required variables have values"
                  echo ""
                  echo "Environment variables (non-sensitive):"
                  echo "  SUPERSET_IMAGE: ${FULL_IMAGE_NAME}"
                  echo "  SUPERSET_PORT: ${SUPERSET_PORT}"
                  echo "  DATABASE_DIALECT: postgresql"
                  echo "  DATABASE_USER: superset"
                  echo "  DATABASE_HOST: db"
                  echo "  DATABASE_PORT: 5432"
                  echo "  DATABASE_DB: superset"
                  echo "  REDIS_HOST: redis"
                  echo "  REDIS_PORT: 6379"
                  echo "  DOCKER_NETWORK: ${DOCKER_NETWORK}"
                  echo "  DOCKER_INITDB_DIR: ${DOCKER_INITDB_DIR}"
                  echo ""
                  echo "Superset admin credentials:"
                  echo "  SUPERSET_ADMIN_USER: ***configured***"
                  echo "  SUPERSET_ADMIN_PASSWORD: ***configured***"
                  echo ""
                  echo "Content of .env.deploy (with secrets masked):"
                  cat .env.deploy | sed 's/PASSWORD=.*/PASSWORD=***masked***/g' | sed 's/SECRET_KEY=.*/SECRET_KEY=***masked***/g'
                  echo ""
                  echo "=== END DEBUG ==="
                env:
                  FULL_IMAGE_NAME: $(FULL_IMAGE_NAME)
                  SUPERSET_SECRET_KEY: $(SUPERSET_SECRET_KEY)
                  SUPERSET_ADMIN_USER: $(SUPERSET_ADMIN_USER)
                  SUPERSET_ADMIN_PASSWORD: $(SUPERSET_ADMIN_PASSWORD)
                  SUPERSET_PORT: $(SUPERSET_PORT)
                  DOCKER_NETWORK: $(DOCKER_NETWORK)
                  DOCKER_INITDB_DIR: $(DOCKER_INITDB_DIR)
                displayName: Create .env.deploy

              # -------------------------------------
              # Cleanup old containers (NOT volumes - data is preserved)
              # -------------------------------------
              - bash: |
                  echo "=== Cleaning up old containers (preserving volumes) ==="
                  cd "$(Pipeline.Workspace)/s" || exit 1

                  echo "Stopping and removing existing containers by name..."
                  docker rm -f superset_db superset_cache superset_init superset_app 2>/dev/null || echo "No named containers to remove"

                  echo "Stopping docker-compose project containers (without removing volumes)..."
                  docker compose -f .azuredevops/docker-compose-deploy.yml --project-name azuredevops down 2>/dev/null || echo "No project containers to stop"

                  echo "✓ Cleanup completed (volumes preserved)"
                  echo ""
                displayName: Cleanup Old Containers

              # -------------------------------------
              # Deploy Superset
              # -------------------------------------
              - bash: |
                  echo "=== DEBUG: Deploy Superset ==="
                  echo "Current working directory: $(pwd)"
                  echo "Pipeline.Workspace: $(Pipeline.Workspace)"
                  echo ""
                  echo "Changing to deployment directory..."
                  cd "$(Pipeline.Workspace)/s" || { echo "✗ ERROR: Failed to cd to $(Pipeline.Workspace)/s"; exit 1; }
                  echo "✓ Changed directory to: $(pwd)"
                  echo ""

                  # Recreate .env.deploy file on deployment target
                  # (previous .env.deploy was on build agent, this is on deployment VM)
                  echo "Creating .env.deploy file..."

                  # SUPERSET_ADMIN_PASSWORD is now available via env: block from pipeline variable

                  cat > .env.deploy << EOF
                  SUPERSET_IMAGE=${FULL_IMAGE_NAME}
                  SUPERSET_SECRET_KEY=${SUPERSET_SECRET_KEY}
                  SUPERSET_ADMIN_USER=${SUPERSET_ADMIN_USER}
                  SUPERSET_ADMIN_PASSWORD=${SUPERSET_ADMIN_PASSWORD}
                  SUPERSET_PORT=${SUPERSET_PORT}
                  DATABASE_DIALECT=postgresql
                  DATABASE_USER=superset
                  DATABASE_PASSWORD=superset
                  DATABASE_HOST=db
                  DATABASE_PORT=5432
                  DATABASE_DB=superset
                  REDIS_HOST=redis
                  REDIS_PORT=6379
                  DOCKER_NETWORK=${DOCKER_NETWORK}
                  DOCKER_INITDB_DIR=${DOCKER_INITDB_DIR}
                  EOF

                  echo "✓ Created .env.deploy file"
                  echo ""
                  echo "Checking .env.deploy content (secrets masked):"
                  cat .env.deploy | sed 's/PASSWORD=.*/PASSWORD=***masked***/g' | sed 's/SECRET_KEY=.*/SECRET_KEY=***masked***/g'
                  echo ""

                  echo "Deploying with docker-compose..."
                  docker compose -f .azuredevops/docker-compose-deploy.yml --env-file .env.deploy --project-name azuredevops up -d

                  echo ""
                  echo "✓ Deployment completed"
                  echo ""
                  echo "Running containers:"
                  docker compose -f .azuredevops/docker-compose-deploy.yml --project-name azuredevops ps
                  echo ""
                  echo "=== END DEBUG ==="
                env:
                  FULL_IMAGE_NAME: $(FULL_IMAGE_NAME)
                  SUPERSET_SECRET_KEY: $(SUPERSET_SECRET_KEY)
                  SUPERSET_ADMIN_USER: $(SUPERSET_ADMIN_USER)
                  SUPERSET_ADMIN_PASSWORD: $(SUPERSET_ADMIN_PASSWORD)
                  SUPERSET_PORT: $(SUPERSET_PORT)
                  DOCKER_NETWORK: $(DOCKER_NETWORK)
                  DOCKER_INITDB_DIR: $(DOCKER_INITDB_DIR)
                displayName: Deploy Superset

              # -------------------------------------
              # Health check
              # -------------------------------------
              - bash: |
                  echo "=== DEBUG: Verify Health ==="
                  echo "Current working directory: $(pwd)"
                  echo "Changing to deployment directory..."
                  cd "$(Pipeline.Workspace)/s" || { echo "Failed to cd to $(Pipeline.Workspace)/s"; exit 1; }
                  echo "✓ Changed directory to: $(pwd)"
                  echo ""
                  echo "Starting health check for Superset on port ${SUPERSET_PORT}..."
                  echo ""

                  # First check if containers are running
                  echo "Checking container status..."
                  docker compose -f .azuredevops/docker-compose-deploy.yml --project-name azuredevops ps
                  echo ""

                  for i in {1..60}; do
                    if curl -fs http://localhost:${SUPERSET_PORT}/health; then
                      echo ""
                      echo "✓ Superset is healthy and responding"
                      exit 0
                    fi
                    echo "Attempt $i/60: Waiting for Superset to be ready..."
                    sleep 10
                  done

                  echo ""
                  echo "✗ Superset failed health check after 10 minutes"
                  echo ""
                  echo "Container logs:"
                  docker compose -f .azuredevops/docker-compose-deploy.yml --project-name azuredevops logs --tail=50
                  exit 1
                env:
                  SUPERSET_PORT: $(SUPERSET_PORT)
                displayName: Verify Health

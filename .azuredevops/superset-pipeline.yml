trigger: none
pr: none

parameters:
  - name: targetEnvironment
    type: string
    default: blue-dev

  - name: dockerPool
    type: string
    displayName: Docker Agent Pool
    default: 'Linux-Hosted'

  - name: cleanBuild
    type: boolean
    default: false
    displayName: 'Clean Build (Disable Cache)'

  # SECRET_KEY is now sourced from blue-dev secret (client-config JSON)
  # Removed hardcoded pipeline parameter - using centralized secret management

variables:
  appName: superset
  containerRegistry: 'IntelliSuite Container Registry'
  acrDomain: 'intellisuite.azurecr.io'
  imageRepository: 'superset'
  dockerfilePath: '$(Build.SourcesDirectory)/Dockerfile'
  artifactName: superset-deployment

  # Conditionally disable cache based on cleanBuild parameter
  system.cacheDisabled: ${{ parameters.cleanBuild }}

  # Conditionally pass --no-cache to Docker build when cleanBuild=true
  # This ensures Docker layer cache and npm cache are disabled
  ${{ if eq(parameters.cleanBuild, true) }}:
    dockerBuildArgs: --no-cache
  ${{ else }}:
    dockerBuildArgs: ''

stages:
# =====================================================
# BUILD STAGE
# =====================================================
- stage: Build
  displayName: Build Superset Docker Image
  jobs:
    - job: BuildDocker
      displayName: Build and Push Docker Image
      pool:
        name: ${{ parameters.dockerPool }}
      steps:
        - checkout: self
          fetchDepth: 0
          submodules: true
          persistCredentials: true

        - bash: |
            echo "=== Validating workspace structure ==="
            echo "Current directory: $(pwd)"
            echo "Build.SourcesDirectory: $(Build.SourcesDirectory)"
            echo ""
            echo "Checking docker directory..."
            if [ -d "$(Build.SourcesDirectory)/docker" ]; then
              echo "✓ docker directory exists"
              ls -la "$(Build.SourcesDirectory)/docker"
            else
              echo "✗ docker directory NOT found"
              exit 1
            fi
            echo ""
            echo "Checking docker-entrypoint-initdb.d..."
            if [ -d "$(Build.SourcesDirectory)/docker/docker-entrypoint-initdb.d" ]; then
              echo "✓ docker-entrypoint-initdb.d exists"
              ls -la "$(Build.SourcesDirectory)/docker/docker-entrypoint-initdb.d"
            else
              echo "✗ docker-entrypoint-initdb.d NOT found"
              exit 1
            fi
            echo ""
            echo "Checking submodules..."
            if [ -d "$(Build.SourcesDirectory)/.github/actions" ]; then
              echo "✓ .github/actions exists"
              ls -la "$(Build.SourcesDirectory)/.github/actions"
            else
              echo "✗ .github/actions NOT found"
            fi
            echo "=== Workspace validation completed ==="
          displayName: Validate Workspace Structure

        - bash: |
            BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            SHORT_SHA=$(echo "$(Build.SourceVersion)" | cut -c1-7)
            SEMANTIC_TAG="$(Build.BuildId)-$SHORT_SHA"

            echo "##vso[task.setvariable variable=BUILD_DATE]$BUILD_DATE"
            echo "##vso[task.setvariable variable=shortCommitSha]$SHORT_SHA"
            echo "##vso[task.setvariable variable=semanticTag]$SEMANTIC_TAG"
          displayName: Set Build Variables

        - task: Docker@2
          displayName: Login to ACR
          inputs:
            command: login
            containerRegistry: $(containerRegistry)

        - task: Docker@2
          displayName: Build Docker Image
          inputs:
            command: build
            containerRegistry: $(containerRegistry)
            repository: $(imageRepository)
            Dockerfile: $(dockerfilePath)
            buildContext: $(Build.SourcesDirectory)
            tags: |
              $(semanticTag)
              latest
            arguments: $(dockerBuildArgs)

        - task: Docker@2
          displayName: Push Docker Image
          inputs:
            command: push
            containerRegistry: $(containerRegistry)
            repository: $(imageRepository)
            tags: |
              $(semanticTag)
              latest

        - bash: |
            mkdir -p $(Build.ArtifactStagingDirectory)
            cat > $(Build.ArtifactStagingDirectory)/deployment.env << EOF
            FULL_IMAGE_NAME=$(acrDomain)/$(imageRepository):$(semanticTag)
            EOF
          displayName: Create Deployment Artifact

        - publish: $(Build.ArtifactStagingDirectory)
          artifact: $(artifactName)

# =====================================================
# DEPLOY STAGE
# =====================================================
# NOTE: This stage uses pwsh (PowerShell Core) for cross-platform
# compatibility. Works on both Windows Server and Linux clients.
#
# Requirements:
# - Windows agents: PowerShell 5+ (native, no installation required)
# - Linux agents: PowerShell Core 7+ (pwsh)
#
# Install pwsh on Linux agents:
#   curl -sSL https://aka.ms/install-powershell.sh | bash -s -- -mt
#
# For detailed documentation, see: .azuredevops/README.md
# =====================================================
- stage: Deploy
  displayName: Deploy to ${{ parameters.targetEnvironment }}
  dependsOn: Build
  variables:
    - group: ${{ parameters.targetEnvironment }}-secret   # Dynamic variable group based on targetEnvironment
  
  jobs:
    - deployment: DeploySuperset
      displayName: Deploy Superset to ${{ parameters.targetEnvironment }}
      environment:
        name: ${{ parameters.targetEnvironment }}
        resourceType: VirtualMachine
      workspace:
        clean: all
      strategy:
        runOnce:
          deploy:
            steps:
              - checkout: self
                submodules: true

              - pwsh: |
                  Write-Host "=== DEBUG: Setting Working Directory ==="
                  Write-Host "Current directory: $(Get-Location)"
                  Write-Host "Pipeline.Workspace: $(Pipeline.Workspace)"
                  Write-Host ""
                  Write-Host "Changing to Pipeline.Workspace/s..."
                  Set-Location "$(Pipeline.Workspace)/s" -ErrorAction Stop
                  Write-Host "✓ Changed directory to: $(Get-Location)"
                  Write-Host ""
                  Write-Host "Contents of current directory:"
                  Get-ChildItem -Force
                  Write-Host ""
                  Write-Host "=== END DEBUG ==="
                displayName: Set Working Directory

              - pwsh: |
                  Write-Host "=== Validating deployment workspace ==="
                  Write-Host "Pipeline.Workspace: $(Pipeline.Workspace)"
                  Write-Host ""
                  Write-Host "Checking docker-entrypoint-initdb.d..."

                  $initDbDir = "$(Pipeline.Workspace)/s/docker/docker-entrypoint-initdb.d"

                  if (Test-Path $initDbDir) {
                    Write-Host "✓ docker-entrypoint-initdb.d exists"
                    Get-ChildItem -Force $initDbDir
                  } else {
                    Write-Host "✗ docker-entrypoint-initdb.d NOT found at $(Pipeline.Workspace)/s/docker/"
                    Write-Host "Available directories in workspace root:"
                    Get-ChildItem -Force "$(Pipeline.Workspace)/s/"
                    exit 1
                  }
                  Write-Host "=== Deployment workspace validation completed ==="
                displayName: Validate Deployment Workspace

              - download: current
                artifact: $(artifactName)

              # -------------------------------------
              # Login to ACR on deployment VM
              # -------------------------------------
              - task: Docker@2
                displayName: Login to ACR
                inputs:
                  command: login
                  containerRegistry: $(containerRegistry)

              # -------------------------------------
              # Rehydrate & validate client config
              # -------------------------------------
              - task: PowerShell@2
                displayName: 'Rehydrate & validate client config'
                env:
                  CLIENT_CONFIG: $(blue-dev-secret)
                inputs:
                  pwsh: true
                  targetType: inline
                  script: |
                    Write-Host "=== Starting config rehydration ==="
                    
                    # Get the secret variable
                    $raw = $env:CLIENT_CONFIG
                    
                    if ([string]::IsNullOrEmpty($raw)) {
                        throw "CLIENT_CONFIG (blue-dev-secret from Key Vault) is empty or not set"
                    }
                    
                    Write-Host "Retrieved config (length: $($raw.Length) chars)"
                    
                    # Detect and decode base64 if applicable
                    $jsonContent = $raw
                    
                    try {
                        $bytes = [System.Convert]::FromBase64String($raw)
                        $decoded = [System.Text.Encoding]::UTF8.GetString($bytes)
                        
                        if ($decoded.TrimStart().StartsWith('{') -or $decoded.TrimStart().StartsWith('[')) {
                            Write-Host "✓ Config decoded from base64"
                            $jsonContent = $decoded
                        }
                    } catch {
                        Write-Host "Config is not base64-encoded, using as raw JSON"
                    }
                    
                    # Write to temp file
                    $out = Join-Path "$(Agent.TempDirectory)" "blue-dev-config.json"
                    Set-Content -Path $out -Value $jsonContent -Encoding UTF8 -NoNewline
                    Write-Host "✓ Config written to: $out"
                    Write-Host "##vso[task.setvariable variable=cfgPath]$out"
                    
                    # Parse JSON
                    try { 
                        $cfg = Get-Content -Raw -Path $out | ConvertFrom-Json
                        Write-Host "✓ JSON parsed successfully"
                    } catch { 
                        throw "Config is not valid JSON: $($_.Exception.Message)" 
                    }
                    
                    # Validate structure
                    if (-not $cfg.'app-suite') {
                        throw "Config missing 'app-suite' property"
                    }
                    
                    if ($cfg.'app-suite'.Count -eq 0) {
                        throw "Config 'app-suite' array is empty"
                    }
                    
                    # Extract Superset (Explorer) and Postgres info
                    $appSuite = $cfg.'app-suite'[0]

                    if (-not $appSuite.explorer) {
                        throw "Config missing 'explorer' section in app-suite[0]"
                    }

                    if (-not $appSuite.postgres) {
                        throw "Config missing 'postgres' section in app-suite[0]"
                    }

                    $explorer = $appSuite.explorer
                    $pg = $appSuite.postgres

                    # Validate required Explorer fields
                    $requiredExplorerFields = @('port', 'admin-user', 'admin-password')
                    foreach ($field in $requiredExplorerFields) {
                        if (-not $explorer.$field) {
                            throw "Config missing required Explorer field: '$field'"
                        }
                    }

                    Write-Host "✓ Config structure validated"

                    # Superset (Explorer) variables
                    Write-Host "Setting Superset variables..."
                    Write-Host "  Port: $($explorer.port)"
                    Write-Host "  Admin User: $($explorer.'admin-user')"

                    Write-Host "##vso[task.setvariable variable=SUPERSET_PORT]$($explorer.port)"
                    Write-Host "##vso[task.setvariable variable=SUPERSET_ADMIN_USER]$($explorer.'admin-user')"

                    # Extract Superset SECRET_KEY from client config
                    $supersetSecretKey = $cfg.'superset-secret-key'

                    if ([string]::IsNullOrWhiteSpace($supersetSecretKey)) {
                        Write-Host "ERROR: superset-secret-key not found in client-config"
                        Write-Host "ERROR: Add 'superset-secret-key' to the root of your client-config JSON"
                        exit 1
                    }

                    Write-Host "✓ SECRET_KEY extracted from client config"
                    Write-Host "##vso[task.setvariable variable=SUPERSET_SECRET_KEY;issecret=true]$supersetSecretKey"

                    # Set admin password as pipeline variable (for deployment stage)
                    Write-Host "##vso[task.setvariable variable=SUPERSET_ADMIN_PASSWORD;issecret=true]$($explorer.'admin-password')"
                    Write-Host "✓ Admin password set as pipeline variable"

                    # Write admin password to temp file (for Create .env.deploy task on build agent)
                    $adminPasswordFile = Join-Path "$(Agent.TempDirectory)" "superset-admin-password.txt"
                    Set-Content -Path $adminPasswordFile -Value $explorer.'admin-password' -NoNewline
                    Write-Host "✓ Admin password written to temp file"

                    # Docker network
                    Write-Host "Setting Docker network..."
                    Write-Host "##vso[task.setvariable variable=DOCKER_NETWORK]superset-network"
                    
                    Write-Host "✓ All variables set successfully"
                    Write-Host "=== Config rehydration completed ==="

              # -------------------------------------
              # Load deployment artifact
              # -------------------------------------
              - pwsh: |
                  $envFile = "$(Pipeline.Workspace)/$(artifactName)/deployment.env"
                  Get-Content $envFile | ForEach-Object {
                    if ($_ -match '^FULL_IMAGE_NAME=(.+)$') {
                      $imageName = $Matches[1]
                      Write-Host "Setting FULL_IMAGE_NAME=$imageName"
                      Write-Host "##vso[task.setvariable variable=FULL_IMAGE_NAME]$imageName"
                      Write-Host "Using image: $imageName"
                    }
                  }
                displayName: Load Deployment Variables

              - pwsh: |
                  Write-Host "Setting DOCKER_INITDB_DIR to workspace path..."
                  $initDbDir = "$(Pipeline.Workspace)/s/docker/docker-entrypoint-initdb.d"
                  Write-Host "##vso[task.setvariable variable=DOCKER_INITDB_DIR]$initDbDir"
                  Write-Host "✓ DOCKER_INITDB_DIR set to: $initDbDir"
                displayName: Set Docker InitDB Directory Path

              # -------------------------------------
              # Debug: Print all available variables
              # -------------------------------------
              - pwsh: |
                  Write-Host "=== DEBUGGING: Printing all pipeline variables ==="
                  Write-Host ""
                  Write-Host "Pipeline variables (Azure DevOps syntax):"
                  Write-Host "  FULL_IMAGE_NAME: '$(FULL_IMAGE_NAME)'"
                  Write-Host "  SUPERSET_SECRET_KEY: '***masked***'"
                  Write-Host "  SUPERSET_ADMIN_USER: '$(SUPERSET_ADMIN_USER)'"
                  Write-Host "  SUPERSET_PORT: '$(SUPERSET_PORT)'"
                  Write-Host "  DOCKER_NETWORK: '$(DOCKER_NETWORK)'"
                  Write-Host "  DOCKER_INITDB_DIR: '$(DOCKER_INITDB_DIR)'"
                  Write-Host ""
                  Write-Host "Environment variables in this shell:"
                  Get-ChildItem Env: | Where-Object { $_.Name -match 'FULL_IMAGE_NAME|SUPERSET|DOCKER_NETWORK|DOCKER_INITDB_DIR' } | ForEach-Object {
                    Write-Host "  $($_.Name)=$($_.Value)"
                  }
                  Write-Host ""
                  Write-Host "=== END DEBUGGING ==="
                displayName: Debug Variables

              # -------------------------------------
              # Create docker-compose env file
              # -------------------------------------
              - pwsh: |
                  Write-Host "=== DEBUG: .env.deploy Creation ==="
                  Write-Host "Current working directory: $(Get-Location)"
                  Write-Host "Pipeline.Workspace: $(Pipeline.Workspace)"
                  Write-Host ""
                  Write-Host "Changing to deployment directory..."
                  Set-Location "$(Pipeline.Workspace)/s" -ErrorAction Stop
                  Write-Host "✓ Changed directory to: $(Get-Location)"
                  Write-Host ""
                  Write-Host "Files in current directory:"
                  Get-ChildItem -Force
                  Write-Host ""
                  Write-Host "Creating .env.deploy file..."

                  # Read admin password from temp file (written by PowerShell step)
                  $adminPasswordFile = Join-Path "$(Agent.TempDirectory)" "superset-admin-password.txt"
                  if (Test-Path $adminPasswordFile) {
                    $SUPERSET_ADMIN_PASSWORD = Get-Content $adminPasswordFile -Raw
                    Write-Host "✓ Read admin password from temp file"
                  } else {
                    Write-Host "✗ ERROR: Admin password file not found: $adminPasswordFile"
                    exit 1
                  }

                  # Create .env.deploy file using here-string
                  $envContent = @"
                  SUPERSET_IMAGE=$$(FULL_IMAGE_NAME)
                  SUPERSET_SECRET_KEY=$$(SUPERSET_SECRET_KEY)
                  SUPERSET_ADMIN_USER=$$(SUPERSET_ADMIN_USER)
                  SUPERSET_ADMIN_PASSWORD=$SUPERSET_ADMIN_PASSWORD
                  SUPERSET_PORT=$$(SUPERSET_PORT)
                  DATABASE_DIALECT=postgresql
                  DATABASE_USER=superset
                  DATABASE_PASSWORD=superset
                  DATABASE_HOST=db
                  DATABASE_PORT=5432
                  DATABASE_DB=superset
                  REDIS_HOST=redis
                  REDIS_PORT=6379
                  DOCKER_NETWORK=$$(DOCKER_NETWORK)
                  DOCKER_INITDB_DIR=$$(DOCKER_INITDB_DIR)
                  "@

                  Set-Content -Path ".env.deploy" -Value $envContent -Encoding UTF8NoBOM
                  Write-Host "✓ Created .env.deploy file"
                  Write-Host ""
                  Write-Host ".env.deploy file location:"
                  Get-ChildItem -Force ".env.deploy"
                  Write-Host ""
                  Write-Host "=== DEBUG: Variable value lengths ==="
                  Write-Host "SUPERSET_SECRET_KEY length: $(SUPERSET_SECRET_KEY.Length)"
                  Write-Host "SUPERSET_ADMIN_USER length: $(SUPERSET_ADMIN_USER.Length)"
                  Write-Host "SUPERSET_ADMIN_PASSWORD length: $SUPERSET_ADMIN_PASSWORD.Length"
                  Write-Host "SUPERSET_PORT length: $(SUPERSET_PORT.Length)"
                  Write-Host ""
                  if ([string]::IsNullOrWhiteSpace("$(SUPERSET_SECRET_KEY)")) {
                    Write-Host "✗ ERROR: SUPERSET_SECRET_KEY is empty!"
                    exit 1
                  }
                  if ([string]::IsNullOrWhiteSpace($SUPERSET_ADMIN_PASSWORD)) {
                    Write-Host "✗ ERROR: SUPERSET_ADMIN_PASSWORD is empty!"
                    exit 1
                  }
                  Write-Host "✓ All required variables have values"
                  Write-Host ""
                  Write-Host "Environment variables (non-sensitive):"
                  Write-Host "  SUPERSET_IMAGE: $(FULL_IMAGE_NAME)"
                  Write-Host "  SUPERSET_PORT: $(SUPERSET_PORT)"
                  Write-Host "  DATABASE_DIALECT: postgresql"
                  Write-Host "  DATABASE_USER: superset"
                  Write-Host "  DATABASE_HOST: db"
                  Write-Host "  DATABASE_PORT: 5432"
                  Write-Host "  DATABASE_DB: superset"
                  Write-Host "  REDIS_HOST: redis"
                  Write-Host "  REDIS_PORT: 6379"
                  Write-Host "  DOCKER_NETWORK: $(DOCKER_NETWORK)"
                  Write-Host "  DOCKER_INITDB_DIR: $(DOCKER_INITDB_DIR)"
                  Write-Host ""
                  Write-Host "Superset admin credentials:"
                  Write-Host "  SUPERSET_ADMIN_USER: ***configured***"
                  Write-Host "  SUPERSET_ADMIN_PASSWORD: ***configured***"
                  Write-Host ""
                  Write-Host "Content of .env.deploy (with secrets masked):"
                  $maskedContent = Get-Content ".env.deploy" -Raw
                  $maskedContent = $maskedContent -replace 'PASSWORD=.*', 'PASSWORD=***masked***' -replace 'SECRET_KEY=.*', 'SECRET_KEY=***masked***'
                  Write-Host $maskedContent
                  Write-Host ""
                  Write-Host "=== END DEBUG ==="
                env:
                  FULL_IMAGE_NAME: $(FULL_IMAGE_NAME)
                  SUPERSET_SECRET_KEY: $(SUPERSET_SECRET_KEY)
                  SUPERSET_ADMIN_USER: $(SUPERSET_ADMIN_USER)
                  SUPERSET_ADMIN_PASSWORD: $(SUPERSET_ADMIN_PASSWORD)
                  SUPERSET_PORT: $(SUPERSET_PORT)
                  DOCKER_NETWORK: $(DOCKER_NETWORK)
                  DOCKER_INITDB_DIR: $(DOCKER_INITDB_DIR)
                displayName: Create .env.deploy

              # -------------------------------------
              # Cleanup old containers (NOT volumes - data is preserved)
              # -------------------------------------
              - pwsh: |
                  Write-Host "=== Cleaning up old containers (preserving volumes) ==="
                  Set-Location "$(Pipeline.Workspace)/s" -ErrorAction Stop

                  Write-Host "Stopping and removing existing containers by name..."
                  docker rm -f superset_db superset_cache superset_init superset_app 2>$null; if ($LASTEXITCODE -ne 0) { Write-Host "No named containers to remove" }

                  Write-Host "Stopping docker-compose project containers (without removing volumes)..."
                  docker compose -f .azuredevops/docker-compose-deploy.yml --env-file .env.deploy --project-name azuredevops down 2>$null; if ($LASTEXITCODE -ne 0) { Write-Host "No project containers to stop" }

                  Write-Host "✓ Cleanup completed (volumes preserved)"
                  Write-Host ""
                displayName: Cleanup Old Containers

              # -------------------------------------
              # Deploy Superset
              # -------------------------------------
              - pwsh: |
                  Write-Host "=== DEBUG: Deploy Superset ==="
                  Write-Host "Current working directory: $(Get-Location)"
                  Write-Host "Pipeline.Workspace: $(Pipeline.Workspace)"
                  Write-Host ""
                  Write-Host "Changing to deployment directory..."
                  Set-Location "$(Pipeline.Workspace)/s" -ErrorAction Stop
                  Write-Host "✓ Changed directory to: $(Get-Location)"
                  Write-Host ""

                  # Recreate .env.deploy file on deployment target
                  # (previous .env.deploy was on build agent, this is on deployment VM)
                  Write-Host "Creating .env.deploy file..."

                  # SUPERSET_ADMIN_PASSWORD is now available via env: block from pipeline variable

                  $envContent = @"
                  SUPERSET_IMAGE=$$(FULL_IMAGE_NAME)
                  SUPERSET_SECRET_KEY=$$(SUPERSET_SECRET_KEY)
                  SUPERSET_ADMIN_USER=$$(SUPERSET_ADMIN_USER)
                  SUPERSET_ADMIN_PASSWORD=$$(SUPERSET_ADMIN_PASSWORD)
                  SUPERSET_PORT=$$(SUPERSET_PORT)
                  DATABASE_DIALECT=postgresql
                  DATABASE_USER=superset
                  DATABASE_PASSWORD=superset
                  DATABASE_HOST=db
                  DATABASE_PORT=5432
                  DATABASE_DB=superset
                  REDIS_HOST=redis
                  REDIS_PORT=6379
                  DOCKER_NETWORK=$$(DOCKER_NETWORK)
                  DOCKER_INITDB_DIR=$$(DOCKER_INITDB_DIR)
"@

                  Set-Content -Path ".env.deploy" -Value $envContent -Encoding UTF8NoBOM
                  Write-Host "✓ Created .env.deploy file"
                  Write-Host ""
                  Write-Host "Checking .env.deploy content (secrets masked):"
                  $maskedContent = Get-Content ".env.deploy" -Raw
                  $maskedContent = $maskedContent -replace 'PASSWORD=.*', 'PASSWORD=***masked***' -replace 'SECRET_KEY=.*', 'SECRET_KEY=***masked***'
                  Write-Host $maskedContent
                  Write-Host ""

                  Write-Host "Deploying with docker-compose..."
                  docker compose -f .azuredevops/docker-compose-deploy.yml --env-file .env.deploy --project-name azuredevops up -d

                  Write-Host ""
                  Write-Host "✓ Deployment completed"
                  Write-Host ""
                  Write-Host "Running containers:"
                  docker ps --filter "name=azuredevops" --format "table {{.Names}}`t{{.Status}}`t{{.Ports}}"
                  Write-Host ""
                  Write-Host "=== END DEBUG ==="
                env:
                  FULL_IMAGE_NAME: $(FULL_IMAGE_NAME)
                  SUPERSET_SECRET_KEY: $(SUPERSET_SECRET_KEY)
                  SUPERSET_ADMIN_USER: $(SUPERSET_ADMIN_USER)
                  SUPERSET_ADMIN_PASSWORD: $(SUPERSET_ADMIN_PASSWORD)
                  SUPERSET_PORT: $(SUPERSET_PORT)
                  DOCKER_NETWORK: $(DOCKER_NETWORK)
                  DOCKER_INITDB_DIR: $(DOCKER_INITDB_DIR)
                displayName: Deploy Superset

              # -------------------------------------
              # Health check
              # -------------------------------------
              - pwsh: |
                  Write-Host "=== DEBUG: Verify Health ==="
                  Write-Host "Current working directory: $(Get-Location)"
                  Write-Host "Changing to deployment directory..."
                  Set-Location "$(Pipeline.Workspace)/s" -ErrorAction Stop
                  Write-Host "✓ Changed directory to: $(Get-Location)"
                  Write-Host ""
                  Write-Host "Starting health check for Superset on port $(SUPERSET_PORT)..."
                  Write-Host ""

                  # First check if containers are running
                  Write-Host "Checking container status..."
                  docker ps --filter "name=azuredevops" --format "table {{.Names}}`t{{.Status}}"
                  Write-Host ""

                  for ($i = 1; $i -le 60; $i++) {
                    $healthUrl = "http://localhost:$(SUPERSET_PORT)/health"
                    try {
                      $response = Invoke-WebRequest -Uri $healthUrl -UseBasicParsing -TimeoutSec 5
                      Write-Host ""
                      Write-Host "✓ Superset is healthy and responding"
                      exit 0
                    } catch {
                      Write-Host "Attempt $i/60: Waiting for Superset to be ready..."
                      Start-Sleep -Seconds 10
                    }
                  }

                  Write-Host ""
                  Write-Host "✗ Superset failed health check after 10 minutes"
                  Write-Host ""
                  Write-Host "Container logs:"
                  docker compose -f .azuredevops/docker-compose-deploy.yml --env-file .env.deploy --project-name azuredevops logs --tail=50
                  exit 1
                env:
                  SUPERSET_PORT: $(SUPERSET_PORT)
                displayName: Verify Health

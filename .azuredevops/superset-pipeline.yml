trigger: none
pr: none

parameters:
  - name: targetEnvironment
    type: string
    default: blue-dev

  - name: dockerPool
    type: string
    displayName: Docker Agent Pool
    default: 'Linux-Hosted'

variables:
  appName: superset
  containerRegistry: 'IntelliSuite Container Registry'
  acrDomain: 'intellisuite.azurecr.io'
  imageRepository: 'superset'
  dockerfilePath: '$(Build.SourcesDirectory)/Dockerfile'
  artifactName: superset-deployment
  vmImageName: 'ubuntu-latest'

stages:
# =====================================================
# BUILD STAGE
# =====================================================
- stage: Build
  displayName: Build Superset Docker Image
  jobs:
    - job: BuildDocker
      displayName: Build and Push Docker Image
      pool:
        vmImage: ubuntu-latest
      steps:
        - checkout: self
          clean: true

        - bash: |
            BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            SHORT_SHA=$(echo "$(Build.SourceVersion)" | cut -c1-7)
            SEMANTIC_TAG="$(Build.BuildId)-$SHORT_SHA"

            echo "##vso[task.setvariable variable=BUILD_DATE]$BUILD_DATE"
            echo "##vso[task.setvariable variable=shortCommitSha]$SHORT_SHA"
            echo "##vso[task.setvariable variable=semanticTag]$SEMANTIC_TAG"
          displayName: Set Build Variables

        - task: Docker@2
          displayName: Login to ACR
          inputs:
            command: login
            containerRegistry: $(containerRegistry)

        - task: Docker@2
          displayName: Build Docker Image
          inputs:
            command: build
            containerRegistry: $(containerRegistry)
            repository: $(imageRepository)
            Dockerfile: $(dockerfilePath)
            buildContext: $(Build.SourcesDirectory)
            tags: |
              $(semanticTag)
              latest

        - task: Docker@2
          displayName: Push Docker Image
          inputs:
            command: push
            containerRegistry: $(containerRegistry)
            repository: $(imageRepository)
            tags: |
              $(semanticTag)
              latest

        - bash: |
            mkdir -p $(Build.ArtifactStagingDirectory)
            cat > $(Build.ArtifactStagingDirectory)/deployment.env << EOF
            FULL_IMAGE_NAME=$(acrDomain)/$(imageRepository):$(semanticTag)
            EOF
          displayName: Create Deployment Artifact

        - publish: $(Build.ArtifactStagingDirectory)
          artifact: $(artifactName)

# =====================================================
# DEPLOY STAGE
# =====================================================
- stage: Deploy_blue_dev
  displayName: Deploy to blue-dev
  dependsOn: Build
  
  jobs:
    - deployment: DeploySuperset
      variables:
        - group: blue-dev-secret   # contains BLUE_DEV_SECRET
      environment:
        name: ${{ parameters.targetEnvironment }}
        resourceType: VirtualMachine
      strategy:
        runOnce:
          deploy:
            steps:
              - checkout: self

              - download: current
                artifact: $(artifactName)

              # -------------------------------------
              # Rehydrate & validate client config
              # -------------------------------------
              - task: PowerShell@2
                displayName: 'Rehydrate & validate client config'
                inputs:
                  pwsh: true
                  targetType: inline
                  script: |
                    Write-Host "=== Starting config rehydration ==="
                    
                    # Get the secret variable
                    $raw = $env:BLUE_DEV_SECRET
                    
                    if ([string]::IsNullOrEmpty($raw)) {
                        throw "BLUE_DEV_SECRET is empty or not set"
                    }
                    
                    Write-Host "Retrieved config (length: $($raw.Length) chars)"
                    
                    # Detect and decode base64 if applicable
                    $jsonContent = $raw
                    
                    try {
                        $bytes = [System.Convert]::FromBase64String($raw)
                        $decoded = [System.Text.Encoding]::UTF8.GetString($bytes)
                        
                        if ($decoded.TrimStart().StartsWith('{') -or $decoded.TrimStart().StartsWith('[')) {
                            Write-Host "✓ Config decoded from base64"
                            $jsonContent = $decoded
                        }
                    } catch {
                        Write-Host "Config is not base64-encoded, using as raw JSON"
                    }
                    
                    # Write to temp file
                    $out = Join-Path "$(Agent.TempDirectory)" "blue-dev-config.json"
                    Set-Content -Path $out -Value $jsonContent -Encoding UTF8 -NoNewline
                    Write-Host "✓ Config written to: $out"
                    Write-Host "##vso[task.setvariable variable=cfgPath]$out"
                    
                    # Parse JSON
                    try { 
                        $cfg = Get-Content -Raw -Path $out | ConvertFrom-Json
                        Write-Host "✓ JSON parsed successfully"
                    } catch { 
                        throw "Config is not valid JSON: $($_.Exception.Message)" 
                    }
                    
                    # Validate structure
                    if (-not $cfg.'app-suite') {
                        throw "Config missing 'app-suite' property"
                    }
                    
                    if ($cfg.'app-suite'.Count -eq 0) {
                        throw "Config 'app-suite' array is empty"
                    }
                    
                    # Extract Superset (Explorer) and Postgres info
                    $appSuite = $cfg.'app-suite'[0]
                    
                    if (-not $appSuite.explorer) {
                        throw "Config missing 'explorer' section in app-suite[0]"
                    }
                    
                    if (-not $appSuite.postgres) {
                        throw "Config missing 'postgres' section in app-suite[0]"
                    }
                    
                    $explorer = $appSuite.explorer
                    $pg = $appSuite.postgres
                    
                    Write-Host "✓ Config structure validated"
                    
                    # Superset (Explorer) variables
                    Write-Host "Setting Superset variables..."
                    Write-Host "  Port: $($explorer.port)"
                    Write-Host "  Admin User: $($explorer.'admin-user')"
                    
                    Write-Host "##vso[task.setvariable variable=SUPERSET_PORT]$($explorer.port)"
                    Write-Host "##vso[task.setvariable variable=SUPERSET_ADMIN_USER]$($explorer.'admin-user')"
                    Write-Host "##vso[task.setvariable variable=SUPERSET_ADMIN_PASSWORD;issecret=true]$($explorer.'admin-password')"
                    
                    # Postgres variables
                    Write-Host "Setting Postgres variables..."
                    Write-Host "  Host: oee-postgres"
                    Write-Host "  Port: 5432"
                    Write-Host "  Database: $($pg.database)"
                    Write-Host "  User: $($pg.admin.user)"
                    
                    Write-Host "##vso[task.setvariable variable=DB_HOST]oee-postgres"
                    Write-Host "##vso[task.setvariable variable=DB_PORT]5432"
                    Write-Host "##vso[task.setvariable variable=DB_NAME]$($pg.database)"
                    Write-Host "##vso[task.setvariable variable=DB_USER]$($pg.admin.user)"
                    Write-Host "##vso[task.setvariable variable=DB_PASSWORD;issecret=true]$($pg.admin.password)"
                    
                    Write-Host "✓ All variables set successfully"
                    Write-Host "=== Config rehydration completed ==="

              # -------------------------------------
              # Load deployment artifact
              # -------------------------------------
              - bash: |
                  source $(Pipeline.Workspace)/$(artifactName)/deployment.env
                  echo "##vso[task.setvariable variable=FULL_IMAGE_NAME]$FULL_IMAGE_NAME"
                  echo "Using image: $FULL_IMAGE_NAME"
                displayName: Load Deployment Variables

              # -------------------------------------
              # Create docker-compose env file
              # -------------------------------------
              - bash: |
                  cat > .env.deploy << EOF
                  SUPERSET_IMAGE=$(FULL_IMAGE_NAME)

                  SUPERSET_SECRET_KEY=$(SUPERSET_SECRET_KEY)
                  SUPERSET_ADMIN_USER=$(SUPERSET_ADMIN_USER)
                  SUPERSET_ADMIN_PASSWORD=$(SUPERSET_ADMIN_PASSWORD)
                  SUPERSET_PORT=$(SUPERSET_PORT)

                  POSTGRES_HOST=$(DB_HOST)
                  POSTGRES_PORT=$(DB_PORT)
                  POSTGRES_DB=$(DB_NAME)
                  POSTGRES_USER=$(DB_USER)
                  POSTGRES_PASSWORD=$(DB_PASSWORD)

                  REDIS_HOST=redis
                  REDIS_PORT=6379

                  DOCKER_NETWORK=$(DOCKER_NETWORK)
                  EOF
                  
                  echo "Created .env.deploy file with the following variables:"
                  echo "  SUPERSET_IMAGE: $(FULL_IMAGE_NAME)"
                  echo "  SUPERSET_PORT: $(SUPERSET_PORT)"
                  echo "  SUPERSET_ADMIN_USER: $(SUPERSET_ADMIN_USER)"
                  echo "  POSTGRES_HOST: $(DB_HOST)"
                  echo "  POSTGRES_PORT: $(DB_PORT)"
                  echo "  POSTGRES_DB: $(DB_NAME)"
                  echo "  POSTGRES_USER: $(DB_USER)"
                displayName: Create .env.deploy

              # -------------------------------------
              # Deploy Superset
              # -------------------------------------
              - bash: |
                  echo "Deploying Superset with docker-compose..."
                  docker compose -f docker-compose-deploy.yml --env-file .env.deploy up -d
                  
                  echo "Deployment completed. Checking running containers..."
                  docker compose -f docker-compose-deploy.yml ps
                displayName: Deploy Superset

              # -------------------------------------
              # Health check
              # -------------------------------------
              - bash: |
                  echo "Starting health check for Superset on port ${SUPERSET_PORT}..."
                  
                  for i in {1..60}; do
                    if curl -fs http://localhost:${SUPERSET_PORT}/health; then
                      echo ""
                      echo "✓ Superset is healthy and responding"
                      exit 0
                    fi
                    echo "Attempt $i/60: Waiting for Superset to be ready..."
                    sleep 10
                  done
                  
                  echo ""
                  echo "✗ Superset failed health check after 10 minutes"
                  echo "Container logs:"
                  docker compose -f docker-compose-deploy.yml logs --tail=50
                  exit 1
                displayName: Verify Health
